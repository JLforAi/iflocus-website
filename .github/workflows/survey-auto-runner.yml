name: SurveyAI Cloud Schedule

on:
  schedule:
    # UTC 01:17 = Taiwan 09:17. Avoid exact-hour GitHub Actions congestion.
    - cron: "17 1 * * *"
  workflow_dispatch:
    inputs:
      enabled:
        description: "Run now? Type true to execute."
        required: true
        default: "false"
      form_url:
        description: "Optional form URL override. Leave empty to use SURVEY_FORM_URL secret."
        required: false
        default: ""
      platform:
        description: "auto, google, or surveycake"
        required: false
        default: "auto"
      count:
        description: "Submissions for this run"
        required: false
        default: "10"
      interval_min_sec:
        description: "Minimum randomized interval between submissions"
        required: false
        default: "30"
      interval_max_sec:
        description: "Maximum randomized interval between submissions"
        required: false
        default: "90"

jobs:
  run-survey:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    env:
      SCHEDULE_ENABLED: ${{ vars.SURVEY_AUTO_ENABLED }}
      SECRET_FORM_URL: ${{ secrets.SURVEY_FORM_URL }}
      DEFAULT_PLATFORM: ${{ vars.SURVEY_PLATFORM }}
      DEFAULT_COUNT: ${{ vars.SURVEY_COUNT_PER_RUN }}
      DEFAULT_INTERVAL_MIN_SEC: ${{ vars.SURVEY_INTERVAL_MIN_SEC }}
      DEFAULT_INTERVAL_MAX_SEC: ${{ vars.SURVEY_INTERVAL_MAX_SEC }}

    steps:
      - name: Decide whether to run
        id: gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.enabled }}" != "true" ]; then
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "Manual run skipped because enabled is not true."
              exit 0
            fi
          elif [ "$SCHEDULE_ENABLED" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Scheduled run skipped because SURVEY_AUTO_ENABLED is not true."
            exit 0
          fi

          FORM_URL="${{ inputs.form_url }}"
          if [ -z "$FORM_URL" ]; then FORM_URL="$SECRET_FORM_URL"; fi
          if [ -z "$FORM_URL" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Run skipped because no form URL was provided."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "form_url=$FORM_URL" >> "$GITHUB_OUTPUT"

      - name: Checkout repo
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        if: steps.gate.outputs.enabled == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run SurveyAI auto runner
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          PLATFORM="${{ inputs.platform }}"
          COUNT="${{ inputs.count }}"
          INTERVAL_MIN="${{ inputs.interval_min_sec }}"
          INTERVAL_MAX="${{ inputs.interval_max_sec }}"

          if [ -z "$PLATFORM" ]; then PLATFORM="${DEFAULT_PLATFORM:-auto}"; fi
          if [ -z "$COUNT" ]; then COUNT="${DEFAULT_COUNT:-10}"; fi
          if [ -z "$INTERVAL_MIN" ]; then INTERVAL_MIN="${DEFAULT_INTERVAL_MIN_SEC:-30}"; fi
          if [ -z "$INTERVAL_MAX" ]; then INTERVAL_MAX="${DEFAULT_INTERVAL_MAX_SEC:-90}"; fi

          python -X utf8 internal/survey_auto_runner.py \
            --form-url "${{ steps.gate.outputs.form_url }}" \
            --platform "$PLATFORM" \
            --count "$COUNT" \
            --interval-min-sec "$INTERVAL_MIN" \
            --interval-max-sec "$INTERVAL_MAX" \
            --headless \
            --job-id "gha-$(date -u +%Y%m%d-%H%M%S)"

      - name: Upload run report
        if: always() && steps.gate.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: survey-auto-results
          path: internal/survey_auto_results/
          if-no-files-found: ignore
